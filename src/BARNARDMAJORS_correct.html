<!DOCTYPE html>
<html>
 
<head>
	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<style>
		#scrolly {
			position: relative;
			background-color: #f3f3f3;
			padding: 1rem;
		}
 
		#scrolly article {
			position: relative;
			padding: 0;
			max-width: 20rem;
			margin: 0 auto;
		}
 
		#scrolly figure {
			position: sticky;
			border: none;
			top: 0;
			height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
		}
 
		#scrolly figure img {
			display: block;
			border: none;
		}
 
		.overlay {
			z-index: 1;
			position: absolute;
			width: 100%;
			max-width: 800px;
			max-height: 100vh;
			object-fit: contain;
			opacity: 0;
			transition: opacity 0.5s ease;
			pointer-events: none;
		}
 
		.overlay.active {
			opacity: 1;
		}
 
		#scrolly .step {
			margin: 0 auto 2rem auto;
			height: 75vh;
			background: none;
		}
 
		#scrolly .step:last-child {
			margin-bottom: 0;
		}
 
		#scrolly .step p {
			display: none;
		}
	</style>
</head>
 
<body>
 
	<section id="scrolly">
		<figure>
			<img class="overlay" data-step="0"
				data-src-desktop="./2016.png"
				data-src-tablet="./2016_tablet.png"
				data-src-mobile="./2016_mobile.png"
				src="./2016.png">
			<img class="overlay" data-step="1"
				data-src-desktop="./2017.png"
				data-src-tablet="./2017_tablet.png"
				data-src-mobile="./2017_mobile.png"
				src="./2017.png">
			<img class="overlay" data-step="2"
				data-src-desktop="./2018.png"
				data-src-tablet="./2018_tablet.png"
				data-src-mobile="./2018_mobile.png"
				src="./2018.png">
			<img class="overlay" data-step="3"
				data-src-desktop="./2019.png"
				data-src-tablet="./2019_tablet.png"
				data-src-mobile="./2019_mobile.png"
				src="./2019.png">
			<img class="overlay" data-step="4"
				data-src-desktop="./2020.png"
				data-src-tablet="./2020_tablet.png"
				data-src-mobile="./2020_mobile.png"
				src="./2020.png">
			<img class="overlay" data-step="5"
				data-src-desktop="./2021.png"
				data-src-tablet="./2021_tablet.png"
				data-src-mobile="./2021_mobile.png"
				src="./2021.png">
			<img class="overlay" data-step="6"
				data-src-desktop="./2022.png"
				data-src-tablet="./2022_tablet.png"
				data-src-mobile="./2022_mobile.png"
				src="./2022.png">
			<img class="overlay" data-step="7"
				data-src-desktop="./2023.png"
				data-src-tablet="./2023_tablet.png"
				data-src-mobile="./2023_mobile.png"
				src="./2023.png">
			<img class="overlay" data-step="8"
				data-src-desktop="./2024.png"
				data-src-tablet="./2024_tablet.png"
				data-src-mobile="./2024_mobile.png"
				src="./2024.png">
			<img class="overlay" data-step="9"
				data-src-desktop="./2025.png"
				data-src-tablet="./2025_tablet.png"
				data-src-mobile="./2025_mobile.png"
				src="./2025.png">
		</figure>
 
		<article>
			<div class="step"></div>
			<div class="step"></div>
			<div class="step"></div>
			<div class="step"></div>
			<div class="step"></div>
			<div class="step"></div>
			<div class="step"></div>
			<div class="step"></div>
			<div class="step"></div>
			<div class="step"></div>
		</article>
	</section>
 
	<script src="https://unpkg.com/d3@5.9.1/dist/d3.min.js"></script>
	<script src="https://unpkg.com/scrollama"></script>
	<script>
		var scrolly = d3.select("#scrolly");
		var article = scrolly.select("article");
		var step = article.selectAll(".step");
		var scroller = scrollama();
 
		function getSizeSuffix() {
			var width = window.innerWidth;
			if (width <= 480) return "mobile";
			if (width <= 1024) return "tablet";
			return "desktop";
		}
 
		function updateImageSources() {
			var size = getSizeSuffix();
			d3.selectAll(".overlay").each(function() {
				this.src = this.dataset["src" + size.charAt(0).toUpperCase() + size.slice(1)];
			});
		}
 
		function handleResize() {
			step.style("height", Math.floor(window.innerHeight * 0.75) + "px");
			updateImageSources();
			scroller.resize();
		}
 
		function handleStepEnter(response) {
			step.classed("is-active", function(d, i) { return i === response.index; });
			d3.selectAll(".overlay").classed("active", function() {
				return +this.dataset.step === response.index;
			});
		}
 
		function init() {
			updateImageSources();
			handleResize();
			scroller
				.setup({
					step: "#scrolly article .step",
					offset: 0.33,
					debug: false
				})
				.onStepEnter(handleStepEnter);
			window.addEventListener("resize", handleResize);
		}
 
		init();
	</script>
 
</body>
</html>
